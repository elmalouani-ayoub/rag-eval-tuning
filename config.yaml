# Grille de recherche d'hyperparametres (le "sweep").
# Chaque combinaison valide (overlap < chunk_size) est evaluee sur les 20 questions.
#
# Tailles/overlap exprimes en MOTS. Les backends "tfidf" et "hashing" tournent
# hors-ligne. Ajouter "sentence-transformers" ou "ollama" pour comparer une
# vraie recherche semantique (necessite telechargement de modele / Ollama).

grid:
  chunk_size:    [40, 80, 120, 200]
  chunk_overlap: [0, 20, 40]
  top_k:         [1, 3, 5, 10]
  embedding:     ["tfidf", "hashing"]

# Chemins par defaut
paths:
  corpus: "data/corpus"
  eval:   "data/eval/questions.json"
  results: "results/results.csv"
